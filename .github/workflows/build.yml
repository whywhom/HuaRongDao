name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build Android Release APK
        run: ./gradlew :composeApp:assembleRelease

      - name: Build Android Release Bundles
        run: ./gradlew :composeApp:bundleRelease

      - name: Build Desktop DMG
        run: ./gradlew :composeApp:packageDmg

      - name: Build Web Wasm
        run: ./gradlew :composeApp:wasmJsBrowserDistribution

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: HuaRongDao-Build-Artifacts
          path: |
            composeApp/build/outputs/apk/release/*.apk
            composeApp/build/compose/binaries/main/dmg/*.dmg
            composeApp/build/dist/wasmJs/productionExecutable/
